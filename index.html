<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The End of Time — The Apostolic Church of Lafayette</title>
<style>
  :root{
    --gold:#e9b85f; --gold-bright:#f6d68a; --gold-deep:#b9802f;
    --cream:#f3e7cf; --muted:#c9b48c;
    --line:rgba(233,184,95,.22);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:#140d07; color:var(--cream); position:relative; min-height:100%;
    font:17px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-text-size-adjust:100%; -webkit-font-smoothing:antialiased;
  }
  /* A warm gold glow that illuminates whichever block you're looking at,
     shimmers softly, and hands off to the next one as you scroll */
  .lit{position:relative}
  /* Glow is bound to the block's own box, so its soft edges fall within the
     divider lines instead of bleeding across them */
  .lit::before{
    content:""; position:absolute; inset:0; z-index:-1; pointer-events:none;
    background:radial-gradient(78% 72% at 50% 50%,
      rgba(255,237,178,.42) 0%,
      rgba(247,200,112,.24) 40%,
      rgba(196,135,56,.09) 64%,
      rgba(20,13,7,0) 82%);
    opacity:0; transition:opacity .55s ease;
  }
  .lit.active::before{opacity:1; animation:breathe 4.5s ease-in-out infinite}
  @keyframes breathe{0%,100%{opacity:.8; filter:saturate(1)}50%{opacity:1; filter:saturate(1.12)}}
  .lit .serif,.lit .day,.lit .addr,.lit .time,.lit .ft,.lit h1{
    transition:text-shadow .55s ease;
  }
  .lit.active .serif,.lit.active .day,.lit.active .addr,.lit.active .time,.lit.active .ft,.lit.active h1{
    text-shadow:0 0 18px rgba(250,214,140,.45);
  }
  .page{position:relative; z-index:1}
  .serif{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,"Times New Roman",serif}
  .wrap{max-width:640px;margin:0 auto;padding:0 24px}
  a{color:inherit}

  .hero{position:relative; text-align:center; padding:78px 0 64px; border-bottom:1px solid var(--line)}
  .eyebrow{font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:var(--gold);line-height:1.9}
  .diamond{color:var(--gold-deep);margin:14px 0 6px;font-size:13px}
  .hero h1{
    font-size:clamp(46px,16vw,84px); line-height:.98; font-weight:600; letter-spacing:.01em;
    color:var(--gold-bright); text-shadow:0 2px 34px rgba(233,184,95,.35); margin:6px 0;
  }
  .byline{font-size:15px;color:var(--muted);margin-top:18px;font-style:italic}
  .cta{
    display:inline-block;margin-top:30px;background:var(--gold);color:#241606;
    text-decoration:none;font-weight:600;font-size:16px;padding:14px 30px;border-radius:999px;
  }
  .cta:active{background:var(--gold-deep)}

  section{padding:46px 0;border-bottom:1px solid var(--line);text-align:center}
  .kicker{font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:22px}

  .show{padding:18px 0;border-top:1px solid var(--line)}
  .show:first-of-type{border-top:0}
  .show .day{font-size:22px;font-weight:600;color:var(--cream)}
  .show .day .serif{color:var(--gold-bright)}
  .show .time{font-size:18px;color:var(--gold);margin-top:4px;letter-spacing:.04em}

  .venue .addr{font-size:20px;color:var(--cream);margin-bottom:4px}
  .venue .city{color:var(--muted)}
  .mapbtn{
    display:inline-flex;align-items:center;gap:8px;margin-top:22px;
    border:1.5px solid var(--gold);color:var(--gold-bright);text-decoration:none;
    font-weight:600;font-size:15px;padding:12px 24px;border-radius:999px;
  }
  .mapbtn:active{background:rgba(233,184,95,.12)}

  footer{text-align:center;padding:40px 24px 60px;color:var(--muted);font-size:14px}
  footer .ft{color:var(--gold-bright);font-size:18px;margin-bottom:6px}
</style>
</head>
<body>

<div class="page">
  <div class="hero">
    <div class="wrap lit">
      <p class="eyebrow">The Apostolic Church of Lafayette<br>presents</p>
      <div class="diamond">&#10070;</div>
      <h1 class="serif">The End<br>of Time</h1>
      <p class="byline">written by Drake Simon</p>
      <a class="cta" href="#when">View showtimes</a>
    </div>
  </div>

  <section id="when" class="wrap">
    <p class="kicker">Showtimes</p>
    <div class="show lit">
      <div class="day"><span class="serif">Saturday</span> &middot; June 20</div>
      <div class="time">6:30 PM</div>
    </div>
    <div class="show lit">
      <div class="day"><span class="serif">Sunday</span> &middot; June 21</div>
      <div class="time">5:00 PM</div>
    </div>
  </section>

  <section class="wrap venue lit">
    <p class="kicker">Location</p>
    <p class="addr">302 Town Center Pkwy</p>
    <p class="city">Lafayette, LA 70503</p>
    <a class="mapbtn" href="https://maps.google.com/?q=302+Town+Center+Pkwy,+Lafayette,+LA+70503" target="_blank" rel="noopener">Get directions</a>
  </section>

  <footer class="lit">
    <div class="ft serif">The End of Time</div>
    <div>The Apostolic Church of Lafayette &middot; June 20&ndash;21</div>
  </footer>
</div>

<script>
  var targets = Array.prototype.slice.call(document.querySelectorAll('.lit'));
  var current = null;
  var ticking = false;

  function update(){
    // Highlight the last block whose top has scrolled above the focus line.
    var line = window.innerHeight * 0.55;
    var best = targets[0];
    for (var i=0;i<targets.length;i++){
      if (targets[i].getBoundingClientRect().top <= line) best = targets[i];
    }
    // The last block sits too low to ever reach the focus line, so once you've
    // actually scrolled to the bottom, light it up.
    if (window.innerHeight + window.scrollY >= document.documentElement.scrollHeight - 2){
      best = targets[targets.length - 1];
    }
    if (best && best !== current){
      if (current) current.classList.remove('active');
      best.classList.add('active');
      current = best;
    }
    ticking = false;
  }
  function onScroll(){ if(!ticking){ ticking = true; requestAnimationFrame(update); } }

  window.addEventListener('scroll', onScroll, {passive:true});
  window.addEventListener('resize', onScroll, {passive:true});
  update();
</script>

</body>
</html>
